<svg width="430" height="760" viewBox="0 0 430 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Envo mobile owner inbox preview</title>
  <desc id="desc">Mobile dark glass lead queue with status chips, customer cards, and owner action buttons.</desc>
  <defs>
    <linearGradient id="phone" x1="42" y1="0" x2="388" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17264A"/>
      <stop offset=".52" stop-color="#0B1024"/>
      <stop offset="1" stop-color="#0B1024"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff" stop-opacity=".13"/>
      <stop offset=".52" stop-color="#ffffff" stop-opacity=".05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".025"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#328BFF"/>
      <stop offset="1" stop-color="#6F4DFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(218 210) scale(260)">
      <stop stop-color="#328BFF" stop-opacity=".36"/>
      <stop offset="1" stop-color="#071126" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40" y="-30" width="510" height="830" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity=".48"/>
    </filter>
  </defs>

  <rect width="430" height="760" rx="48" fill="#071126"/>
  <rect width="430" height="760" rx="48" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <rect x="22" y="18" width="386" height="724" rx="42" fill="url(#phone)" stroke="#ffffff" stroke-opacity=".22" stroke-width="1.5"/>
    <rect x="172" y="38" width="86" height="7" rx="4" fill="#ffffff" opacity=".16"/>

    <g font-family="Inter, Segoe UI, Arial, sans-serif">
      <text x="52" y="88" fill="#BFD3FF" font-size="12" font-weight="900" letter-spacing="3">OWNER INBOX</text>
      <text x="52" y="126" fill="#fff" font-size="32" font-weight="900">Today&apos;s leads</text>
      <rect x="314" y="78" width="54" height="30" rx="15" fill="#86efac" fill-opacity=".12" stroke="#86efac" stroke-opacity=".75"/>
      <text x="341" y="99" fill="#baf7cf" font-size="12" font-weight="900" text-anchor="middle">Live</text>

      <g transform="translate(52 154)">
        <rect width="96" height="44" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity=".13"/>
        <text x="18" y="28" fill="#fff" font-size="13" font-weight="850">New</text>
        <circle cx="74" cy="22" r="13" fill="url(#hot)"/>
        <text x="74" y="27" fill="#fff" font-size="12" font-weight="900" text-anchor="middle">4</text>
      </g>
      <g transform="translate(158 154)">
        <rect width="104" height="44" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity=".13"/>
        <text x="16" y="28" fill="#fff" font-size="13" font-weight="850">Qualify</text>
        <text x="84" y="28" fill="#BFD3FF" font-size="13" font-weight="900">12</text>
      </g>
      <g transform="translate(272 154)">
        <rect width="96" height="44" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity=".13"/>
        <text x="16" y="28" fill="#fff" font-size="13" font-weight="850">Review</text>
      </g>

      <g transform="translate(52 226)">
        <rect width="316" height="118" rx="26" fill="#0B1024" fill-opacity=".76" stroke="#ffffff" stroke-opacity=".16" stroke-width="1.5"/>
        <rect x="20" y="22" width="54" height="54" rx="16" fill="#ffffff" fill-opacity=".11"/>
        <path d="M37 42c12 18 21 26 34 31" stroke="#F8FAFF" stroke-width="4" stroke-linecap="round"/>
        <text x="92" y="42" fill="#fff" font-size="19" font-weight="900">Chris Taylor</text>
        <text x="92" y="68" fill="#D7E2F7" font-size="15" opacity=".86">New voicemail</text>
        <rect x="92" y="88" width="126" height="5" rx="3" fill="#8bb4e8"/>
        <text x="286" y="93" fill="#D7E2F7" font-size="12" text-anchor="end">0:32</text>
      </g>

      <g transform="translate(52 364)">
        <rect width="316" height="108" rx="26" fill="#0B1024" fill-opacity=".73" stroke="#ffffff" stroke-opacity=".16" stroke-width="1.5"/>
        <rect x="20" y="26" width="48" height="48" rx="15" fill="#ffffff" fill-opacity=".11"/>
        <text x="44" y="58" fill="#fff" font-size="21" font-weight="900" text-anchor="middle">T</text>
        <text x="88" y="42" fill="#fff" font-size="18" font-weight="900">Alex H.</text>
        <text x="88" y="68" fill="#D7E2F7" font-size="14" opacity=".86">Can I come test drive Friday?</text>
        <text x="288" y="62" fill="#fff" font-size="30" opacity=".7">›</text>
      </g>

      <g transform="translate(52 492)">
        <rect width="316" height="108" rx="26" fill="#0B1024" fill-opacity=".73" stroke="#ffffff" stroke-opacity=".16" stroke-width="1.5"/>
        <rect x="20" y="26" width="48" height="48" rx="15" fill="#ffffff" fill-opacity=".11"/>
        <circle cx="44" cy="50" r="15" stroke="#fff" stroke-width="3" opacity=".9"/>
        <text x="88" y="42" fill="#fff" font-size="18" font-weight="900">Instagram lead</text>
        <text x="88" y="68" fill="#D7E2F7" font-size="14" opacity=".86">Financing question on tires.</text>
        <text x="288" y="62" fill="#fff" font-size="30" opacity=".7">›</text>
      </g>

      <g transform="translate(52 632)">
        <rect width="96" height="48" rx="17" fill="url(#hot)"/>
        <text x="48" y="31" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">Approve</text>
        <rect x="110" width="96" height="48" rx="17" fill="url(#card)" stroke="#ffffff" stroke-opacity=".14"/>
        <text x="158" y="31" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">Call back</text>
        <rect x="220" width="96" height="48" rx="17" fill="url(#card)" stroke="#ffffff" stroke-opacity=".14"/>
        <text x="268" y="31" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">Assign</text>
      </g>
    </g>
  </g>
</svg>
