      <stop offset="0.52" stop-color="#261842"/>
      <stop offset="1" stop-color="#14102b"/>
    </linearGradient>
    <linearGradient id="bolt" x1="28" y1="16" x2="68" y2="80" gradientUnits="userSpaceOnUse">
