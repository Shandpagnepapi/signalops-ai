<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SignalOps logo mark</title>
  <desc id="desc">A sunset orchid signal bolt mark for SignalOps.</desc>
  <defs>
    <linearGradient id="bolt" x1="25" y1="10" x2="72" y2="85" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffb36d"/>
      <stop offset="0.46" stop-color="#ff6f9c"/>
      <stop offset="1" stop-color="#d770ff"/>
    </linearGradient>
    <linearGradient id="halo" x1="14" y1="8" x2="86" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffb36d" stop-opacity="0.28"/>
      <stop offset="0.58" stop-color="#ff6f9c" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#d770ff" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 1 0 0 .42 0 0 1 0 .68 0 0 0 .42 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <circle cx="48" cy="48" r="38" fill="url(#halo)" opacity="0.8"/>
  <path d="M55.4 11.5 27.8 49.8h18.5l-5.8 34.7 29.8-43.3H51.1l4.3-29.7Z" fill="#18102d" fill-opacity="0.52"/>
  <path d="M55.4 11.5 27.8 49.8h18.5l-5.8 34.7 29.8-43.3H51.1l4.3-29.7Z" fill="none" stroke="url(#bolt)" stroke-width="7" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M33.5 21.5c-4.7 2.4-8.7 5.9-11.7 10.2M73.8 62.2c-3.3 5.5-8.2 9.9-14 12.6" stroke="url(#bolt)" stroke-width="3.2" stroke-linecap="round" opacity="0.55"/>
</svg>
