name: Visual Audit Cloud

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to capture"
        required: false
        default: "https://www.signalops.pro"
      run_label:
        description: "Optional run label"
        required: false
        default: "manual"

jobs:
  visual-audit-cloud:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VISUAL_AUDIT_ENABLED: ${{ secrets.VISUAL_AUDIT_ENABLED }}
      VISUAL_AUDIT_PUBLIC_KEY: ${{ secrets.VISUAL_AUDIT_PUBLIC_KEY }}
      VISUAL_AUDIT_BUCKET: ${{ secrets.VISUAL_AUDIT_BUCKET }}
      VISUAL_AUDIT_MAX_AGE_DAYS: ${{ secrets.VISUAL_AUDIT_MAX_AGE_DAYS }}
      VISUAL_AUDIT_MAX_RUNS: ${{ secrets.VISUAL_AUDIT_MAX_RUNS }}
      VISUAL_AUDIT_MAX_STORAGE_MB: ${{ secrets.VISUAL_AUDIT_MAX_STORAGE_MB }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Supabase visual audit preflight
        run: npm exec -- tsx scripts/supabase-visual-audit-preflight.ts

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run cloud visual audit
        run: npm exec -- tsx scripts/visual-audit-cloud.ts --base-url="${{ inputs.base_url }}" --run-label="${{ inputs.run_label }}"
